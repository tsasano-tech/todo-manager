<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#080808;display:flex;justify-content:center;padding:24px;font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif;}
.wrap{background:#0E0E11;padding:24px 16px 32px;max-width:390px;width:100%;border-radius:16px;}
.sync{display:flex;justify-content:flex-end;align-items:center;gap:6px;margin-bottom:8px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4CAF82;}
.sync-lbl{font-size:10px;color:#505060;letter-spacing:.06em;}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px;}
.t-sub{font-size:10px;font-weight:500;letter-spacing:.35em;color:#505060;text-transform:uppercase;}
.t-main{font-size:38px;font-weight:700;color:#F8F6F2;line-height:1;margin-top:2px;letter-spacing:-.02em;}
.s-num{font-family:'DM Mono',monospace;font-size:32px;color:#F8F6F2;text-align:right;}
.s-num span{color:#4FC3F7;}
.s-num small{color:#505060;font-size:16px;}
.s-lbl{font-size:10px;color:#505060;letter-spacing:.12em;text-align:right;margin-top:3px;}
.prog{height:3px;background:#2A2A35;border-radius:3px;margin-bottom:20px;overflow:visible;position:relative;}
.prog-fill{height:3px;background:linear-gradient(90deg,#FF7B8A,#4FC3F7);border-radius:3px;width:28%;position:relative;}
.prog-fill::after{content:'';position:absolute;right:-1px;top:50%;transform:translateY(-50%);width:7px;height:7px;border-radius:50%;background:#4FC3F7;box-shadow:0 0 12px #4FC3F7;}
.inp-area{background:#1E1E24;border:1px solid #333340;border-radius:14px;padding:14px 16px;margin-bottom:14px;}
.inp-row{display:flex;gap:10px;align-items:center;}
.txt-inp-fake{flex:1;font-size:16px;color:#505060;}
.add-btn{background:#4FC3F7;border:none;color:#0E0E11;font-size:20px;font-weight:700;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.flt-row{display:flex;background:#1E1E24;border-radius:12px;padding:4px;margin-bottom:12px;gap:2px;}
.flt-btn{flex:1;font-size:12px;font-weight:500;padding:8px 10px;background:transparent;border:none;color:#8A8A98;border-radius:9px;text-align:center;}
.flt-btn.on{background:#0E0E11;color:#F8F6F2;box-shadow:0 1px 4px rgba(0,0,0,.5);}
.flt-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:6px;}
.cat-row{display:flex;gap:5px;flex-wrap:wrap;}
.cat-btn{font-size:11px;font-weight:500;padding:5px 12px;border-radius:20px;border:1px solid #2A2A35;background:transparent;color:#8A8A98;}
.cat-btn.on{background:#F8F6F2;border-color:#F8F6F2;color:#0E0E11;}
.srt{background:#1E1E24;border:1px solid #2A2A35;color:#8A8A98;font-size:11px;padding:5px 8px;border-radius:8px;}
.td-list{display:flex;flex-direction:column;gap:6px;}
.td-card{background:#16161A;border:1px solid #2A2A35;border-radius:14px;overflow:hidden;}
.td-card.overdue{border-color:#FF7B8A60;border-left:3px solid #FF7B8A;background:#1F1418;}
.td-card.soon{border-color:#FFD54F50;border-left:3px solid #FFD54F;background:#1C1A12;}
.td-card.done-c{opacity:.38;}
.td-main{display:flex;align-items:center;gap:12px;padding:14px 14px;}
.chk{width:24px;height:24px;border-radius:50%;border:2px solid #333340;flex-shrink:0;}
.chk.on{background:#E8B4B8;border-color:#E8B4B8;display:flex;align-items:center;justify-content:center;color:#0E0E11;font-size:12px;font-weight:700;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.pri{font-size:11px;flex-shrink:0;}
.td-cnt{flex:1;min-width:0;}
.td-txt{font-size:15px;font-weight:500;color:#F8F6F2;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.td-txt.ov{color:#FFBBC2;}
.td-txt.sn{color:#FFE88A;}
.td-txt.dn{text-decoration:line-through;color:#505060;font-weight:400;}
.td-meta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;align-items:center;}
.badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;border:1px solid;white-space:nowrap;}
.exp-btn{font-size:11px;color:#505060;padding:4px 6px;background:transparent;border:none;}
.act-btn{font-size:15px;color:#505060;padding:4px 6px;background:transparent;border:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="sync"><div class="sync-dot"></div><span class="sync-lbl">同期済み</span></div>
  <div class="hdr-top">
    <div><div class="t-sub">Task Manager</div><div class="t-main">TODO</div></div>
    <div><div class="s-num"><span>3</span><small> / 12</small></div><div class="s-lbl">完了 / 合計</div></div>
  </div>
  <div class="prog"><div class="prog-fill"></div></div>

  <div class="inp-area">
    <div class="inp-row">
      <span class="txt-inp-fake">タスクを入力...</span>
      <div class="add-btn">＋</div>
    </div>
  </div>

  <div class="flt-row">
    <div class="flt-btn on">未完了</div>
    <div class="flt-btn">すべて</div>
    <div class="flt-btn">完了済み</div>
  </div>
  <div class="flt-meta">
    <div class="cat-row">
      <span class="cat-btn on">すべて</span>
      <span class="cat-btn">仕事</span>
      <span class="cat-btn">個人</span>
      <span class="cat-btn">その他</span>
    </div>
    <select class="srt"><option>優先度→期限順</option></select>
  </div>

  <div class="td-list">
    <div class="td-card overdue">
      <div class="td-main">
        <div class="chk"></div>
        <div class="dot" style="background:#E8B4B8"></div>
        <span class="pri" style="color:#FF7B8A">▲</span>
        <div class="td-cnt">
          <div class="td-txt ov">京都　賃料振込</div>
          <div class="td-meta">
            <span class="badge" style="color:#FF7B8A;border-color:#FF7B8A40">1日超過</span>
            <span class="badge" style="color:#8A8A98;border-color:#333340">🔔 3日前</span>
            <span class="badge" style="color:#4CAF82;border-color:#1E3A28">🔁 毎月第7営業日</span>
          </div>
        </div>
        <button class="exp-btn">▼</button><button class="act-btn">✎</button><button class="act-btn">✕</button>
      </div>
    </div>

    <div class="td-card soon">
      <div class="td-main">
        <div class="chk"></div>
        <div class="dot" style="background:#E8B4B8"></div>
        <span class="pri" style="color:#FFD54F">◆</span>
        <div class="td-cnt">
          <div class="td-txt sn">給与振込</div>
          <div class="td-meta">
            <span class="badge" style="color:#FFD54F;border-color:#FFD54F40">あと2日</span>
            <span class="badge" style="color:#8A8A98;border-color:#333340">🔔 3日前</span>
            <span class="badge" style="color:#4CAF82;border-color:#1E3A28">🔁 毎月</span>
          </div>
        </div>
        <button class="exp-btn">▼</button><button class="act-btn">✎</button><button class="act-btn">✕</button>
      </div>
    </div>

    <div class="td-card">
      <div class="td-main">
        <div class="chk"></div>
        <div class="dot" style="background:#E8B4B8"></div>
        <span class="pri" style="color:#FFD54F">◆</span>
        <div class="td-cnt">
          <div class="td-txt">東京ワイン振込</div>
          <div class="td-meta">
            <span class="badge" style="color:#6A6A78;border-color:#333340">あと14日</span>
            <span class="badge" style="color:#8A8A98;border-color:#333340">🔔 3日前</span>
            <span class="badge" style="color:#4CAF82;border-color:#1E3A28">🔁 毎月</span>
          </div>
        </div>
        <button class="exp-btn">▼</button><button class="act-btn">✎</button><button class="act-btn">✕</button>
      </div>
    </div>

    <div class="td-card">
      <div class="td-main">
        <div class="chk"></div>
        <div class="dot" style="background:#E8B4B8"></div>
        <span class="pri" style="color:#FFD54F">◆</span>
        <div class="td-cnt">
          <div class="td-txt">Augu雇用契約書整備</div>
          <div class="td-meta"></div>
        </div>
        <button class="exp-btn">▼</button><button class="act-btn">✎</button><button class="act-btn">✕</button>
      </div>
    </div>

    <div class="td-card done-c">
      <div class="td-main">
        <div class="chk on">✓</div>
        <div class="dot" style="background:#E8B4B8"></div>
        <span class="pri" style="color:#FFD54F">◆</span>
        <div class="td-cnt">
          <div class="td-txt dn">京都　売上報告</div>
          <div class="td-meta">
            <span class="badge" style="color:#4CAF82;border-color:#1E3A28">🔁 5/4の10日前に復活</span>
          </div>
        </div>
        <button class="exp-btn">▼</button><button class="act-btn">✎</button><button class="act-btn">✕</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
